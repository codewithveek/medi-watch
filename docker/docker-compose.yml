version: "3.9"

services:
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    env_file: ../.env
    ports:
      - "8080:8080"
    volumes:
      - ../weights:/app/weights
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  dashboard:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../dashboard:/app
    command: sh -c "npm install && npm run build && npx serve dist -p 3000"
    ports:
      - "3000:3000"
    environment:
      - VITE_AGENT_WS_URL=ws://agent:8080/ws
      - VITE_AGENT_API_URL=http://agent:8080
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped
